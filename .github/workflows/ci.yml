# CI for the pure-native Rust voice agent.
name: ci

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Fast, reliable gate on all three OSes: fmt + clippy + tests + build with the
  # heavy on-device ML feature OFF (ML uses the clean stub paths here), so no
  # whisper.cpp/ONNX-runtime native build is needed cross-platform.
  check:
    name: check (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Linux native deps (cpal audio + wgpu/xcap GUI + cmake for aws-lc-rs)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libpipewire-0.3-dev libdrm-dev libgbm-dev libegl-dev pkg-config cmake
      - name: Windows build deps (NASM for aws-lc-rs)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --no-default-features -- -D warnings
      - run: cargo test --workspace --no-default-features
      - run: cargo build --workspace --no-default-features
      # lo-core has no feature gates, so its contract is identical with default
      # features; run it explicitly so a future optional feature can't break it
      # silently.
      - run: cargo test -p lo-core

  # Verify the heavy on-device ML stack (whisper.cpp via CMake + ort + Kokoro +
  # Silero VAD) actually builds on every OS, so a platform-specific toolchain
  # break is caught before a release. macOS additionally compiles the Metal +
  # CoreML backends (enabled by default there) and runs the ML-on tests.
  ml-build:
    name: ml-build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Linux native deps (cpal audio + wgpu/xcap GUI + cmake for whisper.cpp + aws-lc-rs)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libpipewire-0.3-dev libdrm-dev libgbm-dev libegl-dev pkg-config cmake
      - name: Windows build deps (NASM for aws-lc-rs)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1
      - run: cargo build -p lo # default features = ml (asr + tts + vad)
      # ML-on unit tests on the reference target (offline-safe — no model loads).
      - if: runner.os == 'macOS'
        run: cargo test -p lo
