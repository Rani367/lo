# Tag-triggered release: build + package Lo for every platform, checksum the
# installers, attach SLSA build-provenance attestations, and upload everything to
# a (draft) GitHub Release.
#
# Unsigned for now — the signing secrets below are wired but empty ("pipeline
# now, sign later"); fill them in to enable real macOS notarization / Windows
# Authenticode without touching this file. Until then, trust comes for free from
# the SHA256SUMS file and the build-provenance attestations: a downloader can run
#   gh attestation verify <installer> --repo Rani367/lo
# to confirm the artifact was built by this repo's CI from this source.
name: release

on:
  push:
    tags: ["v*"] # v1.0.0, v1.2.3-rc1, …
  workflow_dispatch: {} # manual dry-run: builds + stages artifacts, publishes only for tags

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  package:
    name: package (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS bakes in Metal + CoreML (free, no user-side deps), both arches.
          - { os: macos-14, target: aarch64-apple-darwin, label: macos-arm64, formats: "dmg", extra_features: "" }
          - { os: macos-13, target: x86_64-apple-darwin, label: macos-x64, formats: "dmg", extra_features: "" }
          # Windows + Linux default to CPU whisper (portable, no GPU-driver risk).
          - { os: windows-latest, target: x86_64-pc-windows-msvc, label: windows-x64, formats: "wix,nsis", extra_features: "" }
          # ubuntu-24.04: matches CI's green `ml-build` env. 22.04's PipeWire dev
          # headers are too old for the `libspa` crate (xcap's Wayland capture),
          # which fails to compile there. Trade-off: the .deb/AppImage link the
          # 24.04 glibc, so very old distros should build from source instead.
          - { os: ubuntu-24.04, target: x86_64-unknown-linux-gnu, label: linux-x64, formats: "deb,appimage", extra_features: "" }
          # Optional GPU artifacts (uncomment + add the SDK step to ship them):
          # - { os: windows-latest, target: x86_64-pc-windows-msvc, label: windows-x64-vulkan, formats: "wix,nsis", extra_features: "asr-vulkan" }
          # - { os: ubuntu-24.04, target: x86_64-unknown-linux-gnu, label: linux-x64-vulkan, formats: "appimage", extra_features: "asr-vulkan" }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Linux native deps (cpal audio + wgpu/xcap GUI + cmake for whisper.cpp + aws-lc-rs)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libpipewire-0.3-dev libdrm-dev libgbm-dev libegl-dev pkg-config cmake

      - name: Windows build deps (NASM for aws-lc-rs)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      # Only needed by the optional asr-vulkan matrix entries.
      - name: Vulkan SDK
        if: contains(matrix.extra_features, 'vulkan')
        uses: humbletim/setup-vulkan-sdk@v1.2.1

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Build release binary (ML on; macOS gets Metal+CoreML via cfg)
        shell: bash
        run: |
          FEATURES="ml"
          if [ -n "${{ matrix.extra_features }}" ]; then FEATURES="ml,${{ matrix.extra_features }}"; fi
          cargo build -p lo --release --target ${{ matrix.target }} --features "$FEATURES"

      - name: Package (unsigned; signing secrets wired but empty for now)
        shell: bash
        working-directory: crates/lo
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          WINDOWS_CERT_THUMBPRINT: ${{ secrets.WINDOWS_CERT_THUMBPRINT }}
        run: |
          cargo packager --release \
            --target ${{ matrix.target }} \
            -f ${{ matrix.formats }} \
            --out-dir ../../dist

      # Hand this platform's installers to the aggregation job (which checksums +
      # attests them all together). Replaces a per-OS release upload so a single
      # SHA256SUMS can cover every artifact.
      - name: Stage installers for the release job
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.label }}
          path: |
            dist/*.dmg
            dist/*.msi
            dist/*-setup.exe
            dist/*.deb
            dist/*.AppImage
          if-no-files-found: ignore
          retention-days: 7

  # Collect every platform's installers, checksum them into one SHA256SUMS, attest
  # their build provenance, and publish to a single draft release. Tag pushes only.
  release:
    name: checksum + attest + draft release
    needs: package
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the Release + upload assets
      id-token: write # OIDC token for the provenance attestation
      attestations: write # write the attestation to GitHub's store
    steps:
      - name: Download all staged installers
        uses: actions/download-artifact@v4
        with:
          pattern: installers-*
          path: dist
          merge-multiple: true

      - name: Generate SHA256SUMS
        working-directory: dist
        shell: bash
        run: |
          shopt -s nullglob
          files=(*.dmg *.msi *-setup.exe *.deb *.AppImage)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No installers were produced — failing rather than shipping an empty release." >&2
            exit 1
          fi
          sha256sum "${files[@]}" | tee SHA256SUMS

      - name: Attest build provenance for every installer
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            dist/*.dmg
            dist/*.msi
            dist/*-setup.exe
            dist/*.deb
            dist/*.AppImage

      - name: Upload installers + checksums to the draft release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.msi
            dist/*-setup.exe
            dist/*.deb
            dist/*.AppImage
            dist/SHA256SUMS
          draft: true # review before publishing while unsigned
          generate_release_notes: true
