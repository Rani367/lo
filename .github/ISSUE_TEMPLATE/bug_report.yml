name: Bug report
description: Report a problem with Lo
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the details below so it can be reproduced.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected to happen instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: How can it be reproduced? Include the words you spoke or the action you took.
      placeholder: |
        1. Launch Lo
        2. Say "…"
        3. …
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Lo version
      description: From the installer filename or the release you downloaded (e.g. 1.0.0).
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows
        - Linux
    validations:
      required: true
  - type: dropdown
    id: backend
    attributes:
      label: Brain backend
      options:
        - auto
        - mlx
        - llama
        - ollama
        - custom
        - not sure
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant output from running with `LO_LOG=lo=debug` (redact anything sensitive).
      render: shell
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues for a duplicate.
          required: true
